name: Deploy .NET 10 Blazor App to LXC

on:
  push:
    branches:
      - main

jobs:
  build-test-and-deploy:
    runs-on: self-hosted
    environment: production
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # Tests must pass before anything touches production.
    - name: Restore & Test
      run: dotnet test -c Release

    # Resolve semantic version: MAJOR.MINOR from version.txt, auto-incrementing
    # PATCH via a persistent state file on the runner (~/.roadrunner/deploy-build-state).
    # When version.txt changes (minor bump), PATCH resets to 0.
    - name: Resolve version
      shell: bash
      run: |
        MAJOR_MINOR=$(cat version.txt | tr -d '[:space:]')
        STATE_FILE="${HOME}/.roadrunner/deploy-build-state"
        mkdir -p "$(dirname "$STATE_FILE")"

        if [ -f "$STATE_FILE" ]; then
          PREV_MAJOR_MINOR=$(grep '^MAJOR_MINOR=' "$STATE_FILE" | cut -d= -f2)
          PREV_PATCH=$(grep '^PATCH=' "$STATE_FILE" | cut -d= -f2)
        else
          PREV_MAJOR_MINOR=""
          PREV_PATCH=0
        fi

        if [ "${MAJOR_MINOR}" = "${PREV_MAJOR_MINOR}" ]; then
          PATCH=$((PREV_PATCH + 1))
        else
          PATCH=0
        fi

        VERSION="${MAJOR_MINOR}.${PATCH}"

        cat > "$STATE_FILE" << STATE_EOF
        MAJOR_MINOR=${MAJOR_MINOR}
        PATCH=${PATCH}
        STATE_EOF

        echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
        echo "Resolved version: ${VERSION}"

    - name: Publish App
      run: dotnet publish ./src/RoadrunnerAuction/RoadrunnerAuction.csproj -c Release -o ./publish /p:UseAppHost=false /p:Version=${{ env.VERSION }}

    - name: Install EF Core CLI
      run: dotnet tool install --global dotnet-ef

    - name: Generate EF Core Migration Bundle
      run: dotnet ef migrations bundle --project ./src/RoadrunnerAuction/RoadrunnerAuction.csproj --self-contained -r linux-x64 -o ./publish/efbundle

    # Pre-migration safety net: dump the database to the Synology NAS mount on
    # the Postgres LXC (local peer auth as the postgres OS user - no password needed).
    - name: Backup Database (pg_dump to NAS)
      run: |
        ssh root@10.10.20.110 "mkdir -p /mnt/synology/postgres-data/backups && sudo -u postgres pg_dump roadrunner_db | gzip > /mnt/synology/postgres-data/backups/roadrunner_db-${GITHUB_SHA::8}-$(date +%Y%m%d-%H%M%S).sql.gz"

    # Connection string lives in the EFBUNDLE_CONNECTION GitHub secret - never in the repo.
    - name: Execute Migration Bundle
      run: ./publish/efbundle --connection "${{ secrets.EFBUNDLE_CONNECTION }}"

    # Symlinked releases: deploy into releases/<sha>, flip 'current', restart, health-gate.
    # Keeps the last 5 releases per node for instant rollback (see rollback.yml).
    - name: Deploy to Blazor LXC 01
      run: |
        RELEASE=/var/www/roadrunner/releases/${GITHUB_SHA}
        ssh root@10.10.10.101 "mkdir -p $RELEASE"
        rsync -avz --delete ./publish/ root@10.10.10.101:$RELEASE/
        ssh root@10.10.10.101 "ln -sfn $RELEASE /var/www/roadrunner/current && systemctl restart blazor-app.service && sleep 5 && curl -fsS http://localhost:5000/health"
        ssh root@10.10.10.101 "cd /var/www/roadrunner/releases && ls -1t | tail -n +6 | xargs -r rm -rf"

    - name: Deploy to Blazor LXC 02
      run: |
        RELEASE=/var/www/roadrunner/releases/${GITHUB_SHA}
        ssh root@10.10.10.102 "mkdir -p $RELEASE"
        rsync -avz --delete ./publish/ root@10.10.10.102:$RELEASE/
        ssh root@10.10.10.102 "ln -sfn $RELEASE /var/www/roadrunner/current && systemctl restart blazor-app.service && sleep 5 && curl -fsS http://localhost:5000/health"
        ssh root@10.10.10.102 "cd /var/www/roadrunner/releases && ls -1t | tail -n +6 | xargs -r rm -rf"
