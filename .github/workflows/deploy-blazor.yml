name: Deploy .NET 10 Blazor App to LXC

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore & Publish App
      run: dotnet publish ./src/RoadrunnerAuction/RoadrunnerAuction.csproj -c Release -o ./publish /p:UseAppHost=false
    
    - name: Install EF Core CLI
      run: dotnet tool install --global dotnet-ef

    - name: Generate EF Core Migration Bundle
      run: dotnet ef migrations bundle --project ./src/RoadrunnerAuction/RoadrunnerAuction.csproj --self-contained -r linux-x64 -o ./publish/efbundle

    - name: Execute Migration Bundle
      run: |
        # In a real environment, pull connection string from CI Secrets
        ./publish/efbundle --connection "Host=10.10.20.110;Database=roadrunner_db;Username=admin;Password=secret"
    
    - name: Rsync to Blazor LXC 01
      run: |
        rsync -avz --delete ./publish/ root@10.10.10.101:/var/www/roadrunner/
        ssh root@10.10.10.101 "systemctl restart blazor-app.service"
        
    - name: Rsync to Blazor LXC 02
      run: |
        rsync -avz --delete ./publish/ root@10.10.10.102:/var/www/roadrunner/
        ssh root@10.10.10.102 "systemctl restart blazor-app.service"
