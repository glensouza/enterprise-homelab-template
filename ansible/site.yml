---
# Configuration management for the lab LXCs (docs/08).
# Run after `terraform apply`:  ansible-playbook site.yml
# Target a single tier:         ansible-playbook site.yml --limit web
- name: Configure Blazor web nodes (VLAN 10)
  hosts: web
  roles:
    - dotnet-runtime
    - nfs-mounts
    - blazor-app

- name: Configure PostgreSQL node (VLAN 20)
  hosts: postgres
  roles:
    - nfs-mounts
    - postgres

- name: Configure Technitium DNS (VLAN 30, ADR 20)
  hosts: dns
  roles:
    - technitium

- name: Configure step-ca internal PKI (VLAN 30, ADR 20)
  hosts: pki
  roles:
    - resolver
    - step-ca

- name: Configure the PR preview host (VLAN 40, ADR 19)
  hosts: preview
  roles:
    - resolver
    - docker
    - preview-host
