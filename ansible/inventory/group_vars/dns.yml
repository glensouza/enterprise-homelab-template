---
# Technitium DNS (ADR 20/21). Create an API token in the web UI
# (http://10.10.30.119:5380, after changing the default admin password) and
# uncomment to let Ansible manage zones and records:
# technitium_api_token: "<token>"

# Friendly service names (CNAMEs) in the {{ internal_domain }} zone.
# Hosts themselves get per-host A records automatically (one per LXC in the
# inventory); add CNAMEs here only for port-free, proxy-fronted UIs.
dns_service_cnames:
  - { name: portainer, target: pr-preview }
  - { name: dozzle, target: pr-preview }
  - { name: pgadmin, target: pr-preview }
  - { name: redisinsight, target: pr-preview }
