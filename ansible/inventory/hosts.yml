# Static inventory. Mirrors the CLAUDE.md topology matrix and terraform/lxc.tf.
# `terraform apply` also renders terraform-hosts.yml into this directory with
# the same groups; if both are present, static entries win on conflicts.
all:
  children:
    # VLAN 10 — Blazor web nodes behind the Kemp VIP
    web:
      hosts:
        blazor-web-01:
          ansible_host: 10.10.10.101
        blazor-web-02:
          ansible_host: 10.10.10.102
    # VLAN 20 — PostgreSQL (pgvector) with pgBackRest PITR
    postgres:
      hosts:
        postgresql:
          ansible_host: 10.10.20.110
    # VLAN 30 — Technitium DNS (ADR 20)
    dns:
      hosts:
        technitium-dns:
          ansible_host: 10.10.30.119
    # VLAN 30 — step-ca internal PKI (ADR 20)
    pki:
      hosts:
        step-ca:
          ansible_host: 10.10.30.121
    # VLAN 40 — single non-prod PR preview host (ADR 19)
    preview:
      hosts:
        pr-preview:
          ansible_host: 10.10.40.120
    # Remaining LXCs — no service roles today, but part of `all` so Cockpit,
    # internal DNS A records, and step-ca certificates cover the whole fleet
    # (ADR 21).
    infra:
      hosts:
        cloudflared:
          ansible_host: 10.10.10.5
        garnet:
          ansible_host: 10.10.20.111
        rabbitmq:
          ansible_host: 10.10.20.112
        infisical:
          ansible_host: 10.10.30.116
        uptime-kuma:
          ansible_host: 10.10.30.117
        observability:
          ansible_host: 10.10.30.118
