---
# Installs Cockpit on every LXC (ADR 21) with a TLS certificate signed by the
# internal step-ca (generated by the step-ca role and fetched to the Ansible
# controller), so https://<host>.{{ internal_domain }}:9090 is a green
# padlock for every client that trusts the internal root CA.
- name: Install Cockpit
  ansible.builtin.apt:
    name: cockpit
    update_cache: true
    state: present

- name: Create the Cockpit certificate directory
  ansible.builtin.file:
    path: /etc/cockpit/ws-certs.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install the step-ca certificate for this host
  # Cockpit expects a single PEM file containing the private key followed by
  # the certificate chain. Renewal = re-run the playbook (certs last 1 year).
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fetched/step-ca/cockpit/{{ inventory_hostname }}.pem"
    dest: "/etc/cockpit/ws-certs.d/0-{{ internal_domain }}.cert"
    owner: root
    group: root
    mode: "0600"
  notify: Restart cockpit

- name: Enable and start Cockpit
  ansible.builtin.systemd:
    name: cockpit.socket
    enabled: true
    state: started
