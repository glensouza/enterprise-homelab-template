---
# Installs smallstep step-ca with an ACME provisioner (ADR 20, docs/11).
# The CA issues short-lived certificates for pr-*.{{ preview_domain }} so
# every PR preview gets trusted HTTPS with zero public exposure. Clients must
# trust the root CA once (docs/11 section 4).
- name: Download step-cli and step-ca packages
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - { url: "https://github.com/smallstep/cli/releases/download/v{{ step_cli_version }}/step-cli_{{ step_cli_version }}_amd64.deb", dest: /tmp/step-cli.deb }
    - { url: "https://github.com/smallstep/certificates/releases/download/v{{ step_ca_version }}/step-ca_{{ step_ca_version }}_amd64.deb", dest: /tmp/step-ca.deb }

- name: Install step-cli and step-ca
  ansible.builtin.apt:
    deb: "{{ item }}"
    state: present
  loop:
    - /tmp/step-cli.deb
    - /tmp/step-ca.deb

- name: Store the CA key password
  ansible.builtin.copy:
    dest: /root/.step-ca-password
    content: "{{ step_ca_password }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Initialize step-ca with an ACME provisioner (first run only)
  ansible.builtin.command: >
    step ca init
    --name "{{ step_ca_name }}"
    --dns "{{ step_ca_dns_names }}"
    --address ":{{ step_ca_port }}"
    --provisioner admin
    --password-file /root/.step-ca-password
    --acme
  args:
    creates: /root/.step/config/ca.json

- name: Enable and start step-ca
  ansible.builtin.systemd:
    name: step-ca
    enabled: true
    state: started

- name: Fetch the root CA certificate to the Ansible controller
  # Consumed by the preview-host role (Caddy acme_ca_root) and by admins
  # installing the root into client trust stores (docs/11 section 4).
  ansible.builtin.fetch:
    src: /root/.step/certs/root_ca.crt
    dest: fetched/step-ca/root_ca.crt
    flat: true

# --- Fleet-wide Cockpit certificates (ADR 21) -------------------------------
# Caddy/ACME certs come from the separate "acme" provisioner, so widening the
# JWK provisioner's durations here does not affect the preview sites.

- name: Allow year-long leaf certificates from the admin provisioner
  ansible.builtin.command: >
    step ca provisioner update admin
    --x509-default-dur 8760h --x509-max-dur 8760h
    --password-file /root/.step-ca-password
  changed_when: false

- name: Create the Cockpit certificate directory on the CA
  ansible.builtin.file:
    path: /root/cockpit-certs
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Issue a per-host Cockpit certificate for every LXC
  # Signed centrally on the CA host — no firewall changes needed, and renewal
  # is simply re-running this playbook (certs are valid for 1 year).
  ansible.builtin.command: >
    step ca certificate {{ item }}.{{ internal_domain }}
    /root/cockpit-certs/{{ item }}.crt /root/cockpit-certs/{{ item }}.key
    --provisioner admin --password-file /root/.step-ca-password
    --not-after 8760h --force
  loop: "{{ groups['all'] }}"

- name: Combine key and chain into the Cockpit PEM format
  ansible.builtin.shell: >
    cat /root/cockpit-certs/{{ item }}.key
    /root/cockpit-certs/{{ item }}.crt
    > /root/cockpit-certs/{{ item }}.pem
  loop: "{{ groups['all'] }}"

- name: Fetch Cockpit certificates to the Ansible controller
  # Consumed by the cockpit role, which installs them on each LXC.
  ansible.builtin.fetch:
    src: "/root/cockpit-certs/{{ item }}.pem"
    dest: "fetched/step-ca/cockpit/{{ item }}.pem"
    flat: true
  loop: "{{ groups['all'] }}"
